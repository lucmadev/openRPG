# ───────────────────────────────────────────────
#  openRPG — Árbol de talentos
# ───────────────────────────────────────────────
#  Todos los skills se cargan desde aquí.
#  Editar y hacer /openrpg reload para aplicar.
#
#  Formato:
#   <id>:
#     name: <nombre>
#     description: "<texto>"
#     class: warrior|mage|assassin
#     material: MATERIAL_BUKKIT
#     prerequisites: [<id>, ...]
#     condition:
#       type: <registro_condición>
#       config: { <param>: <valor> }
#     effect:
#       type: <registro_efecto>
#       config: { <param>: <valor> }
# ───────────────────────────────────────────────

skills:
